<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Management</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { background-color: #f8f9fa; }
        .btn-primary-custom { background-color: #002b5c; border: none; }
        .btn-primary-custom:hover { background-color: #001f42; }
        .badge-role { border-radius: 50px; padding: 5px 15px; font-weight: normal; }
    </style>
</head>

<body>

<div class="container my-5">

    <!-- Header with Back button -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">Member Management</h2>
            <p class="text-muted mb-0">
                Register and manage your institution's members
            </p>
        </div>

        <a href="Backoffice.html" class="btn btn-secondary btn-sm">
            Back
        </a>
    </div>

    <!-- Add member button -->
    <div class="mb-4">
        <button class="btn btn-primary-custom text-white w-100 py-2">
            <i class="bi bi-plus"></i> Add Member
        </button>
    </div>

    <!-- Members list card -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-4">
                Member List 
                <small class="text-muted fs-6 fw-normal">4 registered members</small>
            </h5>
            
            <!-- Search field -->
            <div class="input-group mb-4">
                <span class="input-group-text bg-white border-end-0">
                    <i class="bi bi-search"></i>
                </span>
                <input type="text" class="form-control border-start-0"
                       placeholder="Filter by name, email, role or institution...">
            </div>

            <!-- Members table -->
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="table-light">
                        <tr>
                            <th><input type="checkbox" class="form-check-input"></th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Role</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td><input type="checkbox" class="form-check-input"></td>
                            <td>Jose Augusto</td>
                            <td>sdad@gmail.com.br</td>
                            <td>(11) 99282-7989</td>
                            <td>
                                <span class="badge bg-primary badge-role">Member</span>
                            </td>

                            <td class="text-center">
                                <button class="btn btn-sm btn-primary me-2">
                                    <i class="bi bi-pencil"></i> Edit
                                </button>

                                <button class="btn btn-sm btn-danger">
                                    <i class="bi bi-trash"></i> Delete
                                </button>
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listagem de Eventos</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { background-color: #f8f9fa; }
        .btn-primary-custom { background-color: #002b5c; border: none; }
        .btn-primary-custom:hover { background-color: #001f42; }
        .badge-active { background-color: #28a745; }
        .badge-inactive { background-color: #dc3545; }
        .table th { font-weight: 600; }
        .toast-custom {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #002b5c;
            color: #fff;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast-custom.show { opacity: 1; }
    </style>
</head>

<body>

<div class="container my-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">Listagem de Eventos</h2>
            <p class="text-muted mb-0">Gestão completa dos eventos da plataforma</p>
        </div>
        <a href="Backoffice.html" class="btn btn-secondary btn-sm">
            ← Voltar ao Backoffice
        </a>
    </div>

    <!-- Add button -->
    <div class="mb-4">
        <button class="btn btn-primary-custom text-white w-100 py-2" onclick="abrirModalAdicionar()">
            <i class="bi bi-plus-lg"></i> Adicionar Novo Evento
        </button>
    </div>

    <!-- Eventos list -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-4">
                Eventos Criados 
                <small class="text-muted fs-6 fw-normal" id="total-eventos">0 eventos</small>
            </h5>
            
            <!-- Search -->
            <div class="input-group mb-4">
                <span class="input-group-text bg-white border-end-0">
                    <i class="bi bi-search"></i>
                </span>
                <input type="text" id="searchInput" class="form-control border-start-0"
                       placeholder="Filtrar por título..."
                       oninput="filtrar()">
            </div>

            <!-- Table -->
            <div class="table-responsive">
                <table class="table align-middle" id="tabela-eventos">
                    <thead class="table-light">
                        <tr>
                            <th>Título</th>
                            <th>Data</th>
                            <th>Descrição</th>
                            <th>Estado</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Preenchido pelo JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<!-- Modal Adicionar / Editar -->
<div class="modal fade" id="modalForm" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="modalTitulo">Adicionar Evento</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <div class="mb-3">
                    <label class="form-label">Título</label>
                    <input type="text" class="form-control" id="inputTitulo">
                </div>

                <div class="mb-3">
                    <label class="form-label">Data</label>
                    <input type="date" class="form-control" id="inputData">
                </div>

                <div class="mb-3">
                    <label class="form-label">Descrição</label>
                    <textarea class="form-control" id="inputDescricao"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Estado</label>
                    <select class="form-select" id="inputEstado">
                        <option value="true">Ativo</option>
                        <option value="false">Inativo</option>
                    </select>
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button class="btn btn-primary-custom text-white" onclick="guardarEvento()">
                    Guardar
                </button>
            </div>

        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast-custom" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

let eventos = [
    {
        id: 1,
        titulo: "Culto de Domingo",
        data: "2026-04-10",
        descricao: "Culto principal da igreja",
        ativo: true
    },
    {
        id: 2,
        titulo: "Ensaio do Coral",
        data: "2026-04-12",
        descricao: "Preparação para apresentação",
        ativo: false
    }
];

let editandoId = null;
let modalForm = null;

document.addEventListener("DOMContentLoaded", () => {
    modalForm = new bootstrap.Modal(document.getElementById("modalForm"));
    renderizarTabela(eventos);
});

function renderizarTabela(dados) {
    const tbody = document.querySelector("#tabela-eventos tbody");
    tbody.innerHTML = "";

    dados.forEach(ev => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td><strong>${ev.titulo}</strong></td>
            <td>${ev.data}</td>
            <td>${ev.descricao}</td>
            <td>
                <span class="badge ${ev.ativo ? 'badge-active' : 'badge-inactive'}">
                    ${ev.ativo ? 'Ativo' : 'Inativo'}
                </span>
            </td>
            <td class="text-center">

                <button class="btn btn-sm btn-outline-warning me-1"
                    onclick="editarEvento(${ev.id})">
                    <i class="bi bi-pencil"></i>
                </button>

                <button class="btn btn-sm btn-outline-danger"
                    onclick="eliminarEvento(${ev.id})">
                    <i class="bi bi-trash"></i>
                </button>

            </td>
        `;

        tbody.appendChild(tr);
    });

    document.getElementById("total-eventos").textContent =
        `${dados.length} eventos`;
}

function filtrar() {

    const q = document
        .getElementById("searchInput")
        .value
        .toLowerCase();

    const filtrados = eventos.filter(e =>
        e.titulo.toLowerCase().includes(q)
    );

    renderizarTabela(filtrados);
}

function abrirModalAdicionar() {

    editandoId = null;

    document.getElementById("modalTitulo").textContent =
        "Adicionar Evento";

    document.getElementById("inputTitulo").value = "";
    document.getElementById("inputData").value = "";
    document.getElementById("inputDescricao").value = "";
    document.getElementById("inputEstado").value = "true";

    modalForm.show();
}

function editarEvento(id) {

    const ev = eventos.find(x => x.id === id);

    editandoId = id;

    document.getElementById("modalTitulo").textContent =
        "Editar Evento";

    document.getElementById("inputTitulo").value =
        ev.titulo;

    document.getElementById("inputData").value =
        ev.data;

    document.getElementById("inputDescricao").value =
        ev.descricao;

    document.getElementById("inputEstado").value =
        String(ev.ativo);

    modalForm.show();
}

function guardarEvento() {

    const titulo =
        document.getElementById("inputTitulo").value.trim();

    const data =
        document.getElementById("inputData").value;

    const descricao =
        document.getElementById("inputDescricao").value.trim();

    const ativo =
        document.getElementById("inputEstado").value === "true";

    if (!titulo || !data) {
        mostrarToast("Preenche os campos obrigatórios.");
        return;
    }

    if (editandoId) {

        const ev =
            eventos.find(x => x.id === editandoId);

        ev.titulo = titulo;
        ev.data = data;
        ev.descricao = descricao;
        ev.ativo = ativo;

        mostrarToast("Evento atualizado.");

    } else {

        eventos.push({
            id: Date.now(),
            titulo,
            data,
            descricao,
            ativo
        });

        mostrarToast("Evento criado.");
    }

    modalForm.hide();
    filtrar();
}

function eliminarEvento(id) {

    eventos =
        eventos.filter(x => x.id !== id);

    filtrar();

    mostrarToast("Evento eliminado.");
}

function mostrarToast(msg) {

    const t =
        document.getElementById("toast");

    t.textContent = msg;

    t.classList.add("show");

    setTimeout(() =>
        t.classList.remove("show"),
        2500
    );
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Eventos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
body { background-color: #f8f9fa; }
.btn-primary-custom { background-color: #002b5c; border: none; }
.btn-primary-custom:hover { background-color: #001f42; }
.badge-status { border-radius: 50px; padding: 5px 15px; font-weight: normal; }
</style>
</head>

<body>

<div class="container my-5">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
<div>
<h2 class="fw-bold">Gestão de Eventos</h2>
<p class="text-muted">Cadastre e gerencie os eventos da sua instituição</p>
</div>

<div>
<!-- BOTÃO VOLTAR AO DASHBOARD -->
<a href="Backoffice.html" class="btn btn-secondary me-2">
<i class=""></i> Voltar
</a>

</div>
</div>

<!-- BOTÃO ADICIONAR -->
<div class="mb-4">
<button class="btn btn-primary-custom text-white w-100 py-2">
<i class="bi bi-plus"></i> Adicionar Evento
</button>
</div>

<!-- CARD -->
<div class="card shadow-sm">
<div class="card-body">

<h5 class="card-title mb-4">
Lista de Eventos
<small class="text-muted fs-6 fw-normal">4 eventos cadastrados</small>
</h5>

<!-- BUSCA -->
<div class="input-group mb-4">
<span class="input-group-text bg-white border-end-0">
<i class="bi bi-search"></i>
</span>

<input type="text" class="form-control border-start-0"
placeholder="Filtrar por nome do evento, local ou data...">
</div>

<!-- TABELA -->
<div class="table-responsive">
<table class="table align-middle">

<thead class="table-light">
<tr>
<th><input type="checkbox" class="form-check-input"></th>
<th>Evento</th>
<th>Data</th>
<th>Local</th>
<th>Status</th>
<th class="text-center">Ações</th>
</tr>
</thead>

<tbody>

<tr>
<td><input type="checkbox" class="form-check-input"></td>
<td>Workshop de Tecnologia</td>
<td>25/06/2026</td>
<td>Auditório Central</td>

<td>
<span class="badge bg-success badge-status">Ativo</span>
</td>

<td class="text-center">
<button class="btn btn-sm btn-primary me-2">
<i class="bi bi-pencil"></i> Editar
</button>

<button class="btn btn-sm btn-danger">
<i class="bi bi-trash"></i> Apagar
</button>
</td>
</tr>

<tr>
<td><input type="checkbox" class="form-check-input"></td>
<td>Conferência Anual</td>
<td>10/08/2026</td>
<td>Centro de Convenções</td>

<td>
<span class="badge bg-warning text-dark badge-status">Pendente</span>
</td>

<td class="text-center">
<button class="btn btn-sm btn-primary me-2">
<i class="bi bi-pencil"></i> Editar
</button>

<button class="btn btn-sm btn-danger">
<i class="bi bi-trash"></i> Apagar
</button>
</td>
</tr>

</tbody>
</table>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

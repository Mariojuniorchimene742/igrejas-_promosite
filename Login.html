<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador - igrejas+</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #667eea; /* cor simples */
            min-height: 100vh;
        }

        .full-height {
            min-height: 100vh;
        }

        .login-box {
            width: 400px;
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center full-height">

        <div class="bg-white p-4 rounded shadow login-box">

            <div class="text-center mb-4">
                <h3>Login do Administrador</h3>
                <p class="text-muted">igrejas+</p>
            </div>

        

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Digite sua senha">
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" checked>
                <label class="form-check-label">Lembrar de mim</label>
            </div>

            <a href="backoffice.html" class="btn btn-primary w-100">
                Entrar
            </a>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

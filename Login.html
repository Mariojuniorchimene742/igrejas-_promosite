<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador - igrejas+</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #a7c7ff, #d6e6ff); /* baby blue */
            min-height: 100vh;
        }

        .full-height {
            min-height: 100vh;
        }

        .login-box {
            width: 400px;
            border-radius: 15px;
        }

        .logo {
            width: 90px;
            height: 90px;
            object-fit: contain;
        }

        .btn-primary {
            background-color: #5dade2;
            border: none;
        }

        .btn-primary:hover {
            background-color: #3498db;
        }

        .form-control:focus {
            border-color: #5dade2;
            box-shadow: 0 0 5px rgba(93, 173, 226, 0.5);
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center full-height">

        <div class="bg-white p-4 shadow login-box text-center">

            <!-- LOGO -->
            <div class="mb-3">
                <img src="img/logo-igrejas.png" alt="Logo Igrejas+" class="logo">
            </div>

            <h3 class="mb-1">Admin Login</h3>
            <p class="mb-4 fw-bold" style="color:#5dade2; font-size: 1.5rem;">Churches+</p>

            <!-- FORMULÁRIO -->
            <form id="loginForm" class="text-start">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" checked>
                    <label class="form-check-label">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const adminEmail = "admin@igrejas.com"; // email do admin
        const adminPassword = "Senha123";  // senha do admin

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault(); // evita envio automático

            const emailInput = document.getElementById("email").value;
            const passwordInput = document.getElementById("password").value;

            if (emailInput === adminEmail && passwordInput === adminPassword) {
                // login correto
                window.location.href = "Backoffice.html";
            } else {
                // login errado
                alert("Email ou senha inválidos!");
            }
        });
    </script>
</body>

</html>
